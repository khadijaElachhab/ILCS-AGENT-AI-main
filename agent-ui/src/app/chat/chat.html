<div class="p-3">
  <div class="card-body">
    <div class="mb-3">
      <label class="form-label fw-bold">1. Téléverser un Document (PDF)</label>
      <input type="file" class="form-control w-75" id="inputGroupFile01" accept=".pdf"
             (change)="onFileSelected($event)">
      @if(progress){
        <div class="spinner-border text-primary mt-2" role="status">
          <span class="visually-hidden">Loading</span>
        </div>
      }
    </div>

    <hr/>

    <label class="form-label fw-bold">
      2. Posez votre question (Texte ou Voix) :
    </label>
    <div class="d-flex align-items-center gap-2 mb-3">
      <input
        [(ngModel)]="question"
        class="form-control w-50" type="text" placeholder="Écrivez ou dictez...">
        
      <button 
        class="btn" 
        [class.btn-danger]="isRecording" 
        [class.btn-outline-secondary]="!isRecording"
        (click)="startSpeechRecognition()"
        title="Parler">
        <i class="bi bi-mic"></i> {{ isRecording ? 'Écoute en cours...' : 'Parler' }}
      </button>

      <button
        (click)="askAgent()"
        class="btn btn-primary"
        [disabled]="!question">
        Envoyer
      </button>
      
      @if(progress){
        <div class="spinner-border text-primary ms-2" role="status">
        </div>
      }
    </div>
  </div>

  <div class="card-body mt-4">
    @if(reponse){
      <div class="p-3 bg-light border rounded">
        <div class="d-flex justify-content-between align-items-center mb-2">
          <h5 class="text-primary m-0">Réponse de l'IA :</h5>
          <button class="btn btn-sm btn-outline-primary" (click)="speakResponse()">
            {{ isSpeaking ? 'Arrêter' : 'Écouter' }}
          </button>
        </div>
        <markdown [data]="reponse"></markdown>
      </div>
    }
  </div>
</div>
